# Render.com blueprint — automatische deploy uit GitHub
# Gebruik: Render Dashboard → New → Blueprint → kies deze repo
services:
  - type: web
    name: remax-woonspecialist
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
